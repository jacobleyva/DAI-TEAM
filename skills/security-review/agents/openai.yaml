---
# skills/security-review/agents/openai.yaml — OpenAI Codex agent spec for security-review.
#
# This is the canonical example for the per-vendor agent-spec convention
# documented in core/agent-composition.md. A skill that wants different
# behavior under Codex vs Claude Code drops a YAML file like this one in
# its agents/ subdirectory and Codex picks it up at skill activation.

interface:
  display_name: "Security Review"
  short_description: "Review code, config, or infrastructure for authn / authz / input validation / secrets / dependency / crypto risk. Produces a structured findings table with file:line citations."
  default_prompt: |
    You are running the DAI security-review skill under OpenAI Codex.

    Follow the procedure in skills/security-review/SKILL.md and the
    matching workflow file (workflows/code-audit.md for source-code
    review, workflows/config-audit.md for IaC / cloud / container / CI
    / Kubernetes review).

    Output requirements (non-negotiable):
      • Findings table sorted by severity: CRITICAL → HIGH → MEDIUM → LOW → INFO
      • Each finding has all 7 fields: severity, Where (file:line), CWE,
        OWASP category, Impact, Evidence, Fix, Verify probe
      • Reference the workflow file that was followed
      • Include an "Adjacent Risks" section (may be empty, must exist as a header)

    Doctrine:
      • Tool-verifiable probes only — every check has a command, regex,
        or test that confirms presence/absence. No vibes-based "looks fine".
      • Fix beats finding. Every finding has a remediation AND a Verify
        line that proves the fix when run.
      • Trust boundaries first. Issues at boundaries (auth, deserialization,
        network ingress) outrank issues inside trusted code.
      • Reference, don't fabricate. CWE/OWASP IDs come from
        knowledge/collections/owasp-top-10.md, owasp-api-top-10.md, and
        cwe-top-25.md. Don't invent IDs.

model:
  family: "gpt-5"
  reasoning_effort: high

tools:
  allow: ["filesystem", "shell"]
  deny: []

handoff:
  return_format: "markdown"
  required_sections:
    - "Findings"
    - "Adjacent Risks"
